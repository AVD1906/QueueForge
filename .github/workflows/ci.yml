name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        run: npm install
        working-directory: apps/api

      - name: Check API starts
        run: node -e "require('./src/redis.js'); console.log('API modules load OK')"
        working-directory: apps/api

  test-worker:
    name: Test Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        run: npm install
        working-directory: apps/worker

      - name: Check Worker modules load
        run: node -e "require('./src/retry.js'); require('./src/processor.js'); console.log('Worker modules load OK')"
        working-directory: apps/worker

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dashboard dependencies
        run: npm install
        working-directory: apps/dashboard

      - name: Build Dashboard
        run: npm run build
        working-directory: apps/dashboard

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-api, test-worker, build-dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: task-queue-api:latest

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/worker
          push: false
          tags: task-queue-worker:latest

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/dashboard
          push: false
          tags: task-queue-dashboard:latest